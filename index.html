<!DOCTYPE html>
<html>
<head>
<title>FlashNews Pro - Latest India & Tech News 2026</title>

<meta name="description" content="Latest India and Tech News daily.">
<meta name="keywords" content="news, india news, tech news">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}
header{
  text-align:center;
  padding:20px;
  font-size:28px;
  color:#38bdf8;
}
.nav{
  text-align:center;
}
.nav a{
  margin:10px;
  color:#38bdf8;
  text-decoration:none;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#111;
  padding:10px;
  border-radius:10px;
}
.card img{
  width:100%;
}
</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
</div>

<!-- 🔍 Search -->
<div style="text-align:center;margin:20px;">
<input type="text" id="search" placeholder="Search news...">
</div>

<!-- 📅 DATE SELECTOR -->
<div style="text-align:center;margin:20px;">
<input type="date" id="datePicker">
<button onclick="selectDate()">Load News</button>
</div>

<div class="container" id="newsBox"></div>

<script>

// 📰 SHOW FUNCTION (same)
function show(data){
  let box = document.getElementById("newsBox");
  box.innerHTML = "";

  data.forEach(n=>{
    box.innerHTML += `
      <div class="card">
        <img src="${n.img}">
        <h3>${n.title}</h3>
        <p>${n.full}</p>
      </div>
    `;
  });
}

// 📅 LOAD TODAY NEWS
function loadTodayNews(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("datePicker").value = today;
  loadNewsByDate(today);
}

// 📅 LOAD BY DATE FILE
function loadNewsByDate(date){
  fetch("news/" + date + ".json")
  .then(res => res.json())
  .then(data => {
    show(data);
  })
  .catch(()=>{
    document.getElementById("newsBox").innerHTML = "❌ No news for this date";
  });
}

// 📅 BUTTON CLICK
function selectDate(){
  let date = document.getElementById("datePicker").value;
  if(!date){
    alert("Select date first!");
    return;
  }
  loadNewsByDate(date);
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", e=>{
  let val = e.target.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

// 🚀 AUTO LOAD TODAY
loadTodayNews();

</script>

<footer style="text-align:center;padding:20px;">
© 2026 FlashNews Pro
</footer>

</body>
</html>
