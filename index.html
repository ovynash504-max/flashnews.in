<!DOCTYPE html>
<html>
<head>
<title>FlashNews Pro - Latest India & Tech News 2026</title>

<meta name="description" content="Latest India and Tech News daily.">

<style>
body{
  margin:0;
  font-family:'Poppins',Arial;
  background: linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:32px;
  font-weight:bold;
  color:#38bdf8;
}

/* NAV */
.nav{text-align:center;}
.nav a{
  margin:10px;
  color:#38bdf8;
  text-decoration:none;
}
.nav a:hover{
  color:white;
  text-shadow:0 0 10px #38bdf8;
}

/* SLIDER */
.slider{
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  padding:12px;
  text-align:center;
  font-weight:bold;
}

/* TOP BOX */
.top-box{
  text-align:center;
  margin:20px;
}

input,button{
  padding:12px;
  border-radius:30px;
  border:none;
  margin:5px;
}
input{
  background:rgba(255,255,255,0.08);
  color:white;
}
button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card h3{
  padding:10px;
  cursor:pointer;
}

/* FULL */
.full{
  padding:20px;
}
.full img{
  width:100%;
  border-radius:10px;
}

footer{
  text-align:center;
  padding:20px;
  background:#000;
}
</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="nav">
<a href="./index.html">Home</a>
<a href="./about.html">About</a>
<a href="./privacy.html">Privacy</a>
<a href="./contact.html">Contact</a>
</div>

<div class="slider" id="slideText">🚨 Breaking News...</div>

<div class="top-box">
<input type="text" id="search" placeholder="🔍 Search news..."><br>
<input type="date" id="datePicker">
<button onclick="selectDate()">Load News</button>
</div>

<div class="container" id="newsBox"></div>

<script>

// 🔥 SLIDER
const breakingNews = [
"🔥 India Heatwave Alert",
"🚀 ISRO Satellite Launch",
"📈 Stock Market Rise",
"🤖 AI Jobs Increase",
"🌧️ Rain Warning"
];

let bIndex = 0;
setInterval(()=>{
  document.getElementById("slideText").innerText = breakingNews[bIndex];
  bIndex = (bIndex+1)%breakingNews.length;
},3000);


// 🧠 STORE CURRENT NEWS
let currentData = [];

// SHOW NEWS
function show(data){
  currentData = data;

  let box = document.getElementById("newsBox");
  box.innerHTML="";

  data.forEach((n,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${n.img}">
      <h3 onclick="openNews(${i})">${n.title}</h3>
    </div>`;
  });
}

// OPEN FULL NEWS
function openNews(i){
  let n = currentData[i];

  document.body.innerHTML=`
  <div class="full">
    <h1>${n.title}</h1>
    <img src="${n.img}">
    <p>${n.full}</p>
    <br><br>
    <button onclick="location.reload()">⬅ Back</button>
  </div>`;
}

// LOAD NEWS BY DATE
function loadNewsByDate(date){
  fetch("news/" + date + ".json")
  .then(res=>res.json())
  .then(data=>show(data))
  .catch(()=>{
    document.getElementById("newsBox").innerHTML="❌ No news for this date";
  });
}

// TODAY AUTO LOAD
function loadTodayNews(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("datePicker").value = today;
  loadNewsByDate(today);
}

// SELECT DATE
function selectDate(){
  let date = document.getElementById("datePicker").value;
  loadNewsByDate(date);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
  let val = e.target.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

loadTodayNews();

</script>

<footer>© 2026 FlashNews Pro</footer>

</body>
</html>
