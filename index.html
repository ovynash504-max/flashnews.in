<!DOCTYPE html>
<html>
<head>
<title>FlashNews Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

header{
  text-align:center;
  padding:15px;
  background:#000;
  color:#38bdf8;
  font-size:22px;
}

.nav{
  text-align:center;
}
.nav a{
  margin:8px;
  color:#38bdf8;
  text-decoration:none;
}

.slider{
  background:red;
  padding:10px;
  text-align:center;
}

.top-box{
  text-align:center;
  margin:15px;
}

input,button{
  padding:10px;
  border-radius:25px;
  border:none;
  margin:5px;
  width:80%;
  max-width:300px;
}

button{
  background:#38bdf8;
  color:white;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.full{
  padding:15px;
}

/* 🔥 APP HEADER */
.app-header{
  display:flex;
  align-items:center;
  padding:12px 16px;
  background:linear-gradient(135deg,#020617,#0f172a);
}

.app-logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon{
  width:48px;
  height:48px;
  border-radius:14px;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  animation: glow 2s infinite, move 3s infinite;
}

.title{
  font-size:17px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#38bdf8;
}

@keyframes glow{
  0%{transform:scale(1);box-shadow:0 0 10px #38bdf8;}
  50%{transform:scale(1.1);box-shadow:0 0 25px #6366f1;}
  100%{transform:scale(1);box-shadow:0 0 10px #38bdf8;}
}

@keyframes move{
  0%{transform:translateX(0);}
  50%{transform:translateX(12px);}
  100%{transform:translateX(0);}
}

body{animation:fade 1s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* ✅ SPLASH SCREEN */
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  display:flex;
  justify-content:center;
  align-items:center;
}

#splash img{
  width:100%;
  height:100%;
  object-fit:cover;
}

body.loaded #splash{
  opacity:0;
  visibility:hidden;
  transition:1s;
}

</style>
</head>

<body>

<!-- ✅ SPLASH IMAGE -->
<div id="splash">
  <img src="splash.jpg">
</div>

<header class="app-header">
  <div class="app-logo">
    <div class="icon">⚡</div>
    <div class="name">
      <div class="title">Flash News</div>
      <div class="sub">@OVI</div>
    </div>
  </div>
</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
</div>

<div class="slider" id="slideText">Breaking News...</div>

<div class="top-box">
<input type="text" id="search" placeholder="Search news..."><br>
<input type="date" id="datePicker">
<button onclick="selectDate()">Load News</button>
</div>

<div class="container" id="newsBox"></div>
<div id="fullView" style="display:none"></div>

<script>

// ✅ SPLASH AUTO HIDE
window.onload = function(){
  setTimeout(()=>{
    document.body.classList.add("loaded");
  },2000);
};

// (BAKI SAB SAME — TOUCH NAHI KIYA)

// BREAKING NEWS
const breakingNews = [
"India Heatwave Alert",
"ISRO Launch",
"Stock Market Rise",
"AI Jobs Increase"
];

let i=0;
setInterval(()=>{
document.getElementById("slideText").innerText = breakingNews[i];
i=(i+1)%breakingNews.length;
},3000);

// STORE
let currentData=[];

// SHOW
function show(data){
currentData=data;
let box=document.getElementById("newsBox");
box.innerHTML="";

data.forEach((n,i)=>{
box.innerHTML+=`
<div class="card" onclick="openNews(${i})">
<img src="${n.img ? n.img : 'https://picsum.photos/400/250?random=' + Math.random()}">
<h3>${n.title}</h3>
</div>`;
});
}

// OPEN NEWS
function openNews(i){
let n=currentData[i];
document.getElementById("newsBox").style.display="none";
document.getElementById("fullView").style.display="block";

document.getElementById("fullView").innerHTML=`
<div class="full">
<button onclick="goBack()">⬅ Back</button>
<h2>${n.title}</h2>
<img src="${n.img}" style="width:100%">
<p>${n.full}</p>
</div>`;
}

// BACK
function goBack(){
document.getElementById("fullView").style.display="none";
document.getElementById("newsBox").style.display="grid";
}

// DATE FORMAT
function formatDate(date){
let d=new Date(date);
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,'0');
let da=String(d.getDate()).padStart(2,'0');
return `${y}-${m}-${da}`;
}

// LOAD NEWS
function loadNewsByDate(date){
let fixedDate=formatDate(date);

fetch("./news/"+fixedDate+".json?nocache="+new Date().getTime())
.then(res=>res.json())
.then(data=>show(data))
.catch(()=>{
document.getElementById("newsBox").innerHTML="❌ No news available";
});
}

// AUTO LOAD
function loadTodayNews(){
let today=formatDate(new Date());
document.getElementById("datePicker").value=today;
loadNewsByDate(today);
}

// SELECT DATE
function selectDate(){
let input=document.getElementById("datePicker").value;
if(!input){
alert("Select date first");
return;
}
loadNewsByDate(input);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
});

// START
loadTodayNews();

</script>

<footer> © Flashnews pro 2026 ∆
Conducted by @OVYNASH ™</footer>

</body>
</html>
