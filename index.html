<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash News Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

header {
  background: red;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

#newsBox {
  padding: 10px;
}

.card {
  background: #111;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  font-size: 18px;
}

.card p {
  font-size: 14px;
  color: #ccc;
}

.card a {
  color: cyan;
  text-decoration: none;
}
</style>
</head>

<body>

<header>🔥 Flash News Pro</header>

<div id="newsBox">⏳ Loading...</div>

<script>
const API_KEY = "cdd8963cca2514a2bd516fa75bb6baaf";

async function loadNews() {
  const box = document.getElementById("newsBox");
  box.innerHTML = "⏳ Loading...";

  try {
    const url = `https://gnews.io/api/v4/top-headlines?country=in&lang=en&max=10&apikey=${API_KEY}`;
    
    const res = await fetch(url);
    const data = await res.json();

    if (!data.articles) {
      box.innerHTML = "❌ No news found";
      return;
    }

    box.innerHTML = "";

    data.articles.forEach(n => {
      box.innerHTML += `
        <div class="card">
          <img src="${n.image || 'https://via.placeholder.com/300'}">
          <h3>${n.title}</h3>
          <p>${n.description || "No details available"}</p>
          <a href="${n.url}" target="_blank">Read More</a>
        </div>
      `;
    });

  } catch (err) {
    box.innerHTML = "❌ Failed to load news";
    console.log(err);
  }
}

// AUTO LOAD
loadNews();
</script>

</body>
</html>
