<!DOCTYPE html>
<html>
<head>
<header style="text-align:center;padding:15px;background:#000;">

<style>
.logo-text{
  font-size:26px;
  font-weight:bold;
  background: linear-gradient(90deg,#38bdf8,#0ea5e9,#22c55e,#38bdf8);
  background-size: 300%;
  -webkit-background-clip: text;
  color: transparent;
  animation: shine 4s linear infinite;
}

@keyframes shine {
  0% {background-position: 0%;}
  100% {background-position: 300%;}
}
</style>

<div class="logo-text">
⚡ OVYNASH FLASH NEWS 🚀
</div>

</header>

<meta name="description" content="Latest India and Tech News daily.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Poppins',Arial;
  background: linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

header{
  text-align:center;
  padding:15px;
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
}

.nav{text-align:center;}
.nav a{
  margin:8px;
  color:#38bdf8;
  text-decoration:none;
  font-size:14px;
}

.slider{
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  padding:10px;
  text-align:center;
}

.top-box{text-align:center;margin:15px;}

input,button{
  padding:10px;
  border-radius:25px;
  border:none;
  margin:5px;
  width:80%;
  max-width:300px;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{padding:10px;font-size:15px;}

.full{padding:15px;}
.full img{width:100%;border-radius:10px;}

footer{text-align:center;padding:15px;background:#000;}
</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
</div>

<div class="slider" id="slideText">🚨 Breaking News...</div>

<div class="top-box">
<input type="text" id="search" placeholder="🔍 Search news..."><br>
<input type="date" id="datePicker">
<button onclick="selectDate()">Load News</button>
</div>

<div class="container" id="newsBox"></div>
<div id="fullView" style="display:none;"></div>

<script>

// SLIDER
const breakingNews = [
"🔥 India Heatwave Alert",
"🚀 ISRO Satellite Launch",
"📈 Stock Market Rise",
"🤖 AI Jobs Increase",
"🌧️ Rain Warning"
];

let bIndex = 0;
setInterval(()=>{
  document.getElementById("slideText").innerText = breakingNews[bIndex];
  bIndex = (bIndex+1)%breakingNews.length;
},3000);

// STORE
let currentData = [];

// SHOW (ONLY ONE FUNCTION)
function show(data){
  currentData = data;
  let box = document.getElementById("newsBox");
  box.innerHTML="";

  data.forEach((n,i)=>{
    box.innerHTML+=`
    <div class="card" onclick="openNews(${i})">
      <img src="${n.img}" onerror="this.onerror=null; this.src='https://picsum.photos/400/250';">
      <h3>${n.title}</h3>
    </div>`;
  });
}

// FULL NEWS
function openNews(i){
  let n = currentData[i];

  document.getElementById("fullView").style.display = "block";
  document.getElementById("newsBox").style.display = "none";

  document.getElementById("fullView").innerHTML = `
    <div class="full">
      <button onclick="goBack()">⬅ Back</button>
      <h1>${n.title}</h1>
       <img src="${n.img}" onerror="this.onerror=null; this.src='https://picsum.photos/400/250';">
      <p>${n.full}</p>
    </div>
  `;
}

function goBack(){
  document.getElementById("fullView").style.display = "none";
  document.getElementById("newsBox").style.display = "grid";
}

// DATE FORMAT
function formatDate(date){
  let d = new Date(date);
  let year = d.getFullYear();
  let month = String(d.getMonth()+1).padStart(2,'0');
  let day = String(d.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
}

// LOAD NEWS
function loadNewsByDate(date){

  let fixedDate = formatDate(date);

  fetch("news/" + fixedDate + ".json?nocache=" + new Date().getTime())
  .then(res => {
    if(!res.ok) throw "no";
    return res.json();
  })
  .then(data => show(data))
  .catch(()=>{

    let d = new Date(date);
    d.setDate(d.getDate()-1);
    let y = formatDate(d);

    fetch("news/" + y + ".json?nocache=" + new Date().getTime())
    .then(res=>res.json())
    .then(data=>{
      show(data);
      document.getElementById("newsBox").innerHTML +=
      "<p style='text-align:center;color:orange'>⚠ Showing previous news</p>";
    })
    .catch(()=>{
      document.getElementById("newsBox").innerHTML="❌ No news available";
    });
  });
}

// TODAY AUTO LOAD
function loadTodayNews(){
  let today = formatDate(new Date());
  document.getElementById("datePicker").value = today;
  loadNewsByDate(today);
}

// SELECT DATE
function selectDate(){
  let input = document.getElementById("datePicker").value;

  if(!input){
    alert("Select date first");
    return;
  }

  loadNewsByDate(input);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
  let val = e.target.value.toLowerCase();
  let cards = document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
  });
});

// START
loadTodayNews();

</script>

<footer>© 2026 FlashNews Pro ~ conductedby @OVYNASH </footer>
<div style="position:fixed;bottom:10px;right:10px;width:260px;background:#111;padding:10px;border-radius:10px;">
  <div id="chatBox" style="height:150px;overflow:auto;font-size:13px;"></div>
  <input id="msg" placeholder="Type message..." style="width:100%;padding:6px;margin-top:5px;">
  <button onclick="sendMsg()" style="width:100%;margin-top:5px;">Send</button>
</div>

<script>
function sendMsg(){
  let input = document.getElementById("msg").value.toLowerCase();
  let box = document.getElementById("chatBox");

  box.innerHTML += "<p>👤 "+input+"</p>";

  let reply = "Sorry, samajh nahi aaya 😅";

  if(input.includes("news"))
    reply = "👉 Latest news dekhne ke liye home page scroll karo 🔥";

  else if(input.includes("hello") || input.includes("hi"))
    reply = "👋 Hello! Welcome to FlashNews Pro";

  else if(input.includes("sports"))
    reply = "🏏 Sports news ke liye upar scroll karo";

  else if(input.includes("tech"))
    reply = "🤖 Tech news daily update hota hai yaha";

  else if(input.includes("contact"))
    reply = "📞 Contact page pe jao info milega";

  box.innerHTML += "<p>🤖 "+reply+"</p>";

  document.getElementById("msg").value="";
}
</script>
</body>
</html>
