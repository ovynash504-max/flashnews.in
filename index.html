<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashNews Pro</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9746035943574680"
crossorigin="anonymous"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  font-size:32px;
  font-weight:700;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  color:#38bdf8;
  letter-spacing:1px;
}

/* BREAKING BAR */
.breaking{
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  padding:10px;
  text-align:center;
  font-weight:bold;
  animation:blink 1s infinite alternate;
}
@keyframes blink{
  from{opacity:1;}
  to{opacity:0.6;}
}

/* SEARCH BOX */
.search{
  text-align:center;
  margin:20px;
}
.search input{
  padding:15px;
  width:90%;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:16px;
  background:rgba(255,255,255,0.05);
  color:white;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  transition:0.3s;
}
.search input:focus{
  transform:scale(1.05);
  box-shadow:0 0 20px #38bdf8;
}

/* CATEGORY */
.categories{
  text-align:center;
  margin-bottom:10px;
}
.categories button{
  margin:5px;
  padding:10px 18px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.categories button:hover{
  transform:scale(1.15);
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  position:relative;
}
.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 0 25px #38bdf8;
}

/* IMAGE ZOOM */
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  transition:0.4s;
}
.card:hover img{
  transform:scale(1.1);
}

/* TITLE */
.card h3{
  padding:15px;
  font-size:18px;
}

/* FULL PAGE */
.full{
  padding:20px;
  animation:fade 0.5s ease;
}
.full img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* BACK BUTTON */
a{
  color:#38bdf8;
  font-weight:bold;
}

</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="breaking">🚨 Breaking News Live</div>

<div class="search">
<input type="text" id="search" placeholder="🔍 Search latest news...">
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('india')">India</button>
<button onclick="filter('tech')">Tech</button>
</div>

<div class="container" id="newsBox"></div>

<script>

const newsData = [

{ id:1, cat:"india", title:"India New Policy 🇮🇳", full:"Government ne aaj ek naya decision liya jo economy aur jobs pe impact karega. Experts ka kehna hai ye long term growth ke liye strong step hai.", img:"https://images.unsplash.com/photo-1524492412937-b28074a5d7da"},

{ id:2, cat:"tech", title:"AI Boom 🤖", full:"Artificial Intelligence fast grow kar raha hai aur har industry me revolution la raha hai.", img:"https://images.unsplash.com/photo-1677442136019-21780ecad995"},

{ id:3, cat:"india", title:"Weather Alert 🌧️", full:"Heavy rainfall warning jari ki gayi hai. Authorities ne safety guidelines follow karne ko kaha hai.", img:"https://images.unsplash.com/photo-1500673922987-e212871fec22"},

{ id:4, cat:"tech", title:"New Phone Launch 📱", full:"New flagship smartphone powerful processor aur DSLR-level camera ke saath launch hua.", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},

{ id:5, cat:"india", title:"Stock Market 📈", full:"Market me volatility badh gayi hai, investors cautious approach le rahe hain.", img:"https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3"},

{ id:6, cat:"tech", title:"Cyber Alert 🔐", full:"Cyber attacks badh rahe hain. Strong passwords aur 2FA use karne ki salah di gayi hai.", img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b"},

{ id:7, cat:"india", title:"Education Change 📚", full:"New education reforms ke under syllabus update aur digital learning focus badhaya gaya.", img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644"},

{ id:8, cat:"tech", title:"Space News 🚀", full:"New space mission successfully complete hua jo future research ke liye important hai.", img:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa"},

{ id:9, cat:"india", title:"Jobs Update 💼", full:"IT aur startup sector me hiring badh rahi hai, freshers ke liye opportunities open hain.", img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d"},

{ id:10, cat:"tech", title:"Future Tech 🔥", full:"AI, blockchain aur robotics future ko completely transform karne wale hain.", img:"https://images.unsplash.com/photo-1518770660439-4636190af475"}

];

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
  const post = newsData.find(n => n.id == id);

  document.body.innerHTML = `
  <div class="full">
  <h1>${post.title}</h1>
  <img src="${post.img}">
  <p>${post.full}</p>
  <br>
  <a href="index.html">⬅ Back</a>
  </div>
  `;
}

else{
  show(newsData);

  document.getElementById("search").addEventListener("input", e=>{
    const val = e.target.value.toLowerCase();
    show(newsData.filter(n => n.title.toLowerCase().includes(val)));
  });
}

function show(data){
  const box = document.getElementById("newsBox");
  box.innerHTML = "";
  data.forEach(n=>{
    box.innerHTML += `
    <div class="card" onclick="openPost(${n.id})">
      <img src="${n.img}">
      <h3>${n.title}</h3>
    </div>
    `;
  });
}

function openPost(id){
  window.location.href = "index.html?id=" + id;
}

function filter(cat){
  if(cat==="all") show(newsData);
  else show(newsData.filter(n => n.cat === cat));
}

</script>

</body>
</html>
