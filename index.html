<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash News Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}
header{
    background:red;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
#newsBox{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
    padding:10px;
}
.card{
    background:#222;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
.card img{
    width:100%;
    border-radius:10px;
}
#fullView{
    display:none;
    padding:10px;
}
button{
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:5px;
}
</style>

</head>
<body>

<header>🔥 Flash News Pro</header>

<div id="newsBox">⏳ Loading...</div>
<div id="fullView"></div>

<script>

let currentData = [];

function show(data){
    currentData = data;
    let box = document.getElementById("newsBox");
    box.innerHTML = "";

    data.forEach((n,i)=>{
        box.innerHTML += `
        <div class="card" onclick="openNews(${i})">
            <img src="${n.img}">
            <h3>${n.title}</h3>
        </div>`;
    });
}

function openNews(i){
    let n = currentData[i];

    document.getElementById("newsBox").style.display="none";
    let full = document.getElementById("fullView");
    full.style.display="block";

    full.innerHTML = `
    <button onclick="goBack()">⬅ Back</button>
    <h2>${n.title}</h2>
    <img src="${n.img}" style="width:100%">
    <p>${n.full}</p>
    `;
}

function goBack(){
    document.getElementById("fullView").style.display="none";
    document.getElementById("newsBox").style.display="grid";
}


// 🔥 LOAD NEWS (FIXED)
function loadNews(){

document.getElementById("newsBox").innerHTML="⏳ Loading...";

fetch("https://api.allorigins.win/raw?url=https://gnews.io/api/v4/top-headlines?country=in&lang=en&apikey=cdd8963cca2514a2bd516fa75bb6baaf")
.then(res=>res.json())
.then(data=>{

    let articles = data.articles;

    let formatted = articles.map(n=>({
        title:n.title,
        img:n.image || "https://via.placeholder.com/300",
        full:n.description || "No details available"
    }));

    show(formatted);

})
.catch(()=>{
    document.getElementById("newsBox").innerHTML="❌ Failed to load news";
});

}

loadNews();

</script>

</body>
</html>
