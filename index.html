<!DOCTYPE html> 
<html>
<head>
<title>FlashNews Pro - Latest India & Tech News 2026</title>

<meta name="description" content="Latest India and Tech News daily.">

<style>
body{
  margin:0;
  font-family:'Poppins',Arial;
  background: linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}
header{
  text-align:center;
  padding:20px;
  font-size:32px;
  font-weight:bold;
  color:#38bdf8;
}
.nav{text-align:center;}
.nav a{margin:10px;color:#38bdf8;text-decoration:none;}
.top-box{text-align:center;margin:20px;}
input,button{
  padding:12px;border-radius:30px;border:none;margin:5px;
}
input{background:rgba(255,255,255,0.08);color:white;}
button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;cursor:pointer;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{width:100%;height:180px;object-fit:cover;}
.card h3{padding:10px;}
.error{text-align:center;color:red;}

/* FULL NEWS PAGE */
.full{
  padding:20px;
}
.full img{
  width:100%;
  border-radius:10px;
}

footer{text-align:center;padding:20px;background:#000;}
</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="nav">
<a href="./index.html">Home</a>
<a href="./about.html">About</a>
<a href="./privacy.html">Privacy</a>
<a href="./contact.html">Contact</a>
</div>

<div class="top-box">
<input type="text" id="search" placeholder="🔍 Search news..."><br>
<input type="date" id="datePicker">
<button onclick="selectDate()">Load News</button>
</div>

<div class="container" id="newsBox"></div>

<script>

// 🔥 ALL NEWS DATA
const allNews = {
"2026-04-23":[

{title:"ISRO Mission 🚀",full:"New satellite launch announce.",img:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa"},

{title:"AI Boom 🤖",full:"AI jobs badh rahe hain.",img:"https://images.unsplash.com/photo-1677442136019-21780ecad995"},
{title:"Cyber Alert 🔐",full:"Online fraud cases badh rahe hain.",img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b"},
{title:"Rain Alert 🌧️",full:"Heavy rainfall warning.",img:"https://images.unsplash.com/photo-1500673922987-e212871fec22"},
{title:"New Phone 📱",full:"Flagship smartphone launch.",img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{title:"Education 📚",full:"New policy introduce.",img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644"},
{title:"Jobs 💼",full:"IT jobs demand high.",img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d"},
{title:"Space 🌌",full:"New discovery.",img:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa"},
{title:"EV Growth ⚡",full:"Electric vehicles demand badh rahi hai.",img:"https://images.unsplash.com/photo-1511396275271-7c1cfe3b8b7c"},
{title:"Petrol Price ⛽",full:"Fuel price update.",img:"https://images.unsplash.com/photo-1581091870627-3e7e7d0f8f5b"},
{title:"Bank Update 🏦",full:"New banking rules.",img:"https://images.unsplash.com/photo-1565372911440-3a7d1d2c7e6f"},
{title:"Internet Speed 🌐",full:"5G expand ho raha hai.",img:"https://images.unsplash.com/photo-1519389950473-47ba0277781c"},
{title:"Startup Funding 💰",full:"Startups ko funding mil rahi hai.",img:"https://images.unsplash.com/photo-1553729784-e91953dec042"},
{title:"Health Alert 🏥",full:"Garmi se health issue badh rahe hain.",img:"https://images.unsplash.com/photo-1588776814546-1ffcf47267a5"},
{title:"Travel Rush ✈️",full:"Holiday travel badh raha hai.",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{title:"Cricket 🏏",full:"Match me exciting performance.",img:"https://images.unsplash.com/photo-1505842465776-3ac1c7c9b38a"},
{title:"Food Price 🍲",full:"Sabzi mehengi ho rahi hai.",img:"https://images.unsplash.com/photo-1498837167922-ddd27525d352"},
{title:"Future Tech 🔥",full:"AI aur blockchain future hai.",img:"https://images.unsplash.com/photo-1518770660439-4636190af475"}
]
};

// SHOW
function show(data){
  let box=document.getElementById("newsBox");
  box.innerHTML="";
  data.forEach((n,i)=>{
    box.innerHTML+=`
    <div class="card" onclick="openNews(${i})">
    <img src="${n.img}">
    <h3>${n.title}</h3>
    </div>`;
  });
}

// 🔥 OPEN FULL NEWS
function openNews(i){
  let date=document.getElementById("datePicker").value;
  let news=allNews[date][i];

  document.body.innerHTML=`
  <div class="full">
    <h1>${news.title}</h1>
    <img src="${news.img}">
    <p>${news.full}</p>
    <br><br>
    <button onclick="location.reload()">⬅ Back</button>
  </div>`;
}

// LOAD TODAY
function loadTodayNews(){
  let today="2026-04-23";
  document.getElementById("datePicker").value=today;
  show(allNews[today]);
}

// SELECT DATE
function selectDate(){
  let date=document.getElementById("datePicker").value;
  if(allNews[date]){
    show(allNews[date]);
  }else{
    document.getElementById("newsBox").innerHTML="❌ No news";
  }
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
  let val=e.target.value.toLowerCase();
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
  });
});

loadTodayNews();

</script>

<footer>Conducted by @OVYNASH.                © 2026 FlashNews Pro</footer>

</body>
</html>
