<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashNews Pro</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9746035943574680"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}
header{
  text-align:center;
  padding:20px;
  font-size:30px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  color:#38bdf8;
}
.breaking{
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  padding:10px;
  text-align:center;
  font-weight:bold;
}
.search{
  text-align:center;
  margin:15px;
}
.search input{
  padding:12px;
  width:85%;
  border-radius:25px;
  border:none;
  background:#111;
  color:white;
}
.categories{
  text-align:center;
}
.categories button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#38bdf8;
  color:white;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card h3{
  padding:15px;
}
.full{
  padding:20px;
}
.full img{
  width:100%;
}
</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>
<div class="breaking">🚨 Breaking News Live</div>

<div class="search">
<input type="text" id="search" placeholder="Search news...">
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('india')">India</button>
<button onclick="filter('tech')">Tech</button>
</div>

<div class="container" id="newsBox"></div>

<script>

const newsData = [

{ id:1, cat:"india", title:"India New Policy 🇮🇳", full:"Government ne aaj ek naya decision liya jo economy aur jobs pe impact karega. Experts ka kehna hai ye future growth ke liye important step hai.", img:"https://images.unsplash.com/photo-1524492412937-b28074a5d7da"},

{ id:2, cat:"tech", title:"AI Boom 🤖", full:"Artificial Intelligence ka use rapidly badh raha hai aur industries me bada change la raha hai.", img:"https://images.unsplash.com/photo-1677442136019-21780ecad995"},

{ id:3, cat:"india", title:"Weather Alert 🌧️", full:"Heavy rainfall ka alert diya gaya hai aur logon ko safe rehne ki salah di gayi hai.", img:"https://images.unsplash.com/photo-1500673922987-e212871fec22"},

{ id:4, cat:"tech", title:"New Phone Launch 📱", full:"Ek powerful smartphone launch hua hai jisme strong camera aur battery di gayi hai.", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},

{ id:5, cat:"india", title:"Stock Market 📈", full:"Market me aaj utar-chadhav dekhne ko mila, investors alert hain.", img:"https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3"},

{ id:6, cat:"tech", title:"Cyber Alert 🔐", full:"Online fraud badh rahe hain, users ko alert rehne ki salah di gayi hai.", img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b"},

{ id:7, cat:"india", title:"Education Change 📚", full:"Students ke liye naye rules aur syllabus update kiya gaya hai.", img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644"},

{ id:8, cat:"tech", title:"Space News 🚀", full:"New space mission successful raha aur future research ke liye important hai.", img:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa"},

{ id:9, cat:"india", title:"Jobs Update 💼", full:"IT sector me jobs increase ho rahi hain aur freshers ke liye chances badh rahe hain.", img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d"},

{ id:10, cat:"tech", title:"Future Tech 🔥", full:"AI aur blockchain future ko completely change kar sakte hain.", img:"https://images.unsplash.com/photo-1518770660439-4636190af475"}

];

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
  const post = newsData.find(n => n.id == id);

  document.body.innerHTML = `
  <div class="full">
  <h1>${post.title}</h1>
  <img src="${post.img}">
  <p>${post.full}</p>
  <br>
  <a href="index.html" style="color:#38bdf8">⬅ Back</a>
  </div>
  `;
}

else{
  show(newsData);

  document.getElementById("search").addEventListener("input", e=>{
    const val = e.target.value.toLowerCase();
    show(newsData.filter(n => n.title.toLowerCase().includes(val)));
  });
}

function show(data){
  const box = document.getElementById("newsBox");
  box.innerHTML = "";
  data.forEach(n=>{
    box.innerHTML += `
    <div class="card" onclick="openPost(${n.id})">
      <img src="${n.img}">
      <h3>${n.title}</h3>
    </div>
    `;
  });
}

function openPost(id){
  window.location.href = "index.html?id=" + id;
}

function filter(cat){
  if(cat==="all") show(newsData);
  else show(newsData.filter(n => n.cat === cat));
}

</script>

</body>
</html>
