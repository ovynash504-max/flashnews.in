<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashNews Pro</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9746035943574680"
     crossorigin="anonymous"></script>
<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#020617,#0f172a);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:28px;
  color:#38bdf8;
}

/* BREAKING */
.breaking{
  background:red;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* SEARCH */
.search{
  text-align:center;
  margin:10px;
}
.search input{
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
}

/* CATEGORY */
.categories{
  text-align:center;
  margin:10px;
}
.categories button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card h3{
  padding:10px;
}

/* ADS */
.ads{
  background:#111;
  text-align:center;
  padding:20px;
  margin:10px;
  border:1px dashed gray;
}

/* FULL PAGE */
.full{
  padding:20px;
}
.full img{
  width:100%;
  border-radius:10px;
}

</style>
</head>

<body>

<header>FlashNews Pro 🚀</header>

<div class="breaking">🚨 Breaking: Latest updates live</div>

<div class="search">
<input type="text" id="search" placeholder="Search news...">
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('india')">India</button>
<button onclick="filter('tech')">Tech</button>
</div>

<div class="ads">💰 Your Ad Here (AdSense)</div>

<div class="container" id="newsBox"></div>

<script>

const newsData = [

{ id:1, cat:"india", title:"India Update 🚨", full:"Government ne naya decision liya hai jo economy ko impact karega.", img:"https://images.unsplash.com/photo-1504711434969-e33886168f5c"},

{ id:2, cat:"tech", title:"AI Growth 🤖", full:"AI tools fast grow kar rahe hain aur industries change ho rahi hain.", img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},

{ id:3, cat:"tech", title:"Smartphone Launch 📱", full:"New phones better camera aur performance ke saath aa rahe hain.", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"}

];

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
  const post = newsData.find(n => n.id == id);

  document.body.innerHTML = `
  <div class="full">
  <h1>${post.title}</h1>
  <img src="${post.img}">
  <p>${post.full}</p>
  <br>
  <a href="index.html" style="color:#38bdf8">⬅ Back</a>
  </div>
  `;
}

else{
  show(newsData);

  document.getElementById("search").addEventListener("input", e=>{
    const val = e.target.value.toLowerCase();
    show(newsData.filter(n => n.title.toLowerCase().includes(val)));
  });
}

function show(data){
  const box = document.getElementById("newsBox");
  box.innerHTML = "";
  data.forEach(n=>{
    box.innerHTML += `
    <div class="card" onclick="openPost(${n.id})">
      <img src="${n.img}">
      <h3>${n.title}</h3>
    </div>
    `;
  });
}

function openPost(id){
  window.location.href = "index.html?id=" + id;
}

function filter(cat){
  if(cat==="all") show(newsData);
  else show(newsData.filter(n => n.cat === cat));
}

</script>

</body>
</html>
